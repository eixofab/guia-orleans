<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrleCompras - Busca Local</title>
    <style>
        body { font-family: arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: #fff; overflow-x: hidden; }

        /* Estilo da Logo OrleCompras */
        .logo { font-size: 70px; font-weight: bold; margin-bottom: 30px; letter-spacing: -3px; transition: 0.3s; cursor: pointer; }
        /* Cores inspiradas no Google para o nome OrleCompras */
        .logo span:nth-child(1) { color: #4285F4; } /* O */
        .logo span:nth-child(2) { color: #EA4335; } /* r */
        .logo span:nth-child(3) { color: #FBBC05; } /* l */
        .logo span:nth-child(4) { color: #4285F4; } /* e */
        .logo span:nth-child(5) { color: #34A853; } /* C */
        .logo span:nth-child(6) { color: #EA4335; } /* o */
        .logo span:nth-child(7) { color: #FBBC05; } /* m */
        .logo span:nth-child(8) { color: #4285F4; } /* p */
        .logo span:nth-child(9) { color: #34A853; } /* r */
        .logo span:nth-child(10) { color: #EA4335; } /* a */
        .logo span:nth-child(11) { color: #FBBC05; } /* s */

        /* Container de Busca */
        .main-search-container { margin-top: 100px; width: 100%; max-width: 650px; display: flex; flex-direction: column; align-items: center; transition: all 0.4s ease; }
        .search-area { display: flex; width: 90%; gap: 10px; align-items: center; }
        .search-box-wrapper { flex: 1; display: flex; align-items: center; border: 1px solid #dfe1e5; border-radius: 24px; padding: 0 15px; height: 44px; }
        .search-box-wrapper:focus-within { box-shadow: 0 1px 6px rgba(32,33,36,0.28); border-color: transparent; }
        .search-box-wrapper input { flex: 1; border: none; outline: none; font-size: 16px; margin-left: 10px; }
        
        .btn-google { background: #f8f9fa; border: 1px solid #f8f9fa; color: #3c4043; padding: 0 16px; height: 40px; border-radius: 4px; font-size: 14px; cursor: pointer; }

        /* Resultados e Mapa */
        .content-layout { display: flex; width: 100%; max-width: 1000px; margin-top: 20px; display: none; padding: 0 20px; gap: 30px; }
        .results-column { flex: 1; }
        .map-column { width: 350px; position: sticky; top: 20px; height: 400px; }

        .result-item { margin-bottom: 25px; padding: 15px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
        .result-item:hover { background: #f8f9fa; border-color: #dfe1e5; }
        .result-title { color: #1a0dab; font-size: 20px; text-decoration: none; display: block; margin-bottom: 5px; }
        .result-snippet { color: #4d5156; font-size: 14px; }

        iframe { width: 100%; height: 100%; border: 1px solid #dfe1e5; border-radius: 8px; }

        /* Layout quando pesquisado */
        body.searched .main-search-container { margin-top: 20px; align-items: flex-start; max-width: 90%; margin-left: 20px; }
        body.searched .logo { font-size: 28px; margin-bottom: 10px; }
        body.searched .content-layout { display: flex; }

        @media (max-width: 768px) {
            .content-layout { flex-direction: column; }
            .map-column { width: 100%; height: 250px; order: -1; position: relative; }
        }
    </style>
</head>
<body id="pageBody">

<div class="main-search-container">
    <div class="logo" onclick="location.reload()">
        <span>O</span><span>r</span><span>l</span><span>e</span><span>C</span><span>o</span><span>m</span><span>p</span><span>r</span><span>a</span><span>s</span>
    </div>
    <div class="search-area">
        <div class="search-box-wrapper">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="O que você quer comprar em Orleans?" onkeyup="event.key === 'Enter' && fazerPesquisa()">
        </div>
        <button class="btn-google" onclick="fazerPesquisa()">Pesquisar</button>
    </div>
</div>

<div class="content-layout" id="contentLayout">
    <div class="results-column" id="resultsList"></div>

    <div class="map-column" id="mapColumn">
        <div id="mapPlaceholder" style="padding: 20px; background: #f1f3f4; border-radius: 8px; text-align: center; color: #70757a; font-size: 14px;">
            Selecione uma loja para ver o local no mapa
        </div>
        <iframe id="googleMap" style="display:none" src=""></iframe>
    </div>
</div>

<script>
    // Banco de dados simulado
    const empresas = [
        { nome: "Museu ao Ar Livre", bairro: "Conde D'Eu", endereco: "Rua Padre Januário Abel, Orleans, SC", desc: "Patrimônio histórico e tecnológico de Orleans." },
        { nome: "Esculturas do Paredão", bairro: "Centro", endereco: "Rua Etienne Stawiarski, Orleans, SC", desc: "Arte monumental esculpida em rocha." },
        { nome: "Supermercado das Colinas", bairro: "Barro Vermelho", endereco: "Rodovia SC-390, Orleans, SC", desc: "As melhores ofertas para suas compras mensais." },
        { nome: "Moda Orleans Store", bairro: "Centro", endereco: "Rua Aristiliano Ramos, Orleans, SC", desc: "Roupas e acessórios com o melhor estilo da cidade." },
        { nome: "Igreja Matriz Santa Otília", bairro: "Centro", endereco: "Praça Celso Ramos, Orleans, SC", desc: "Ponto central e histórico de Orleans." }
    ];

    function fazerPesquisa() {
        const termo = document.getElementById('searchInput').value.toLowerCase().trim();
        document.getElementById('pageBody').classList.add('searched');

        // Se o campo estiver vazio, mostra todas as empresas cadastradas
        const filtradas = termo === "" ? empresas : empresas.filter(e => 
            e.nome.toLowerCase().includes(termo) || 
            e.bairro.toLowerCase().includes(termo) ||
            e.desc.toLowerCase().includes(termo)
        );

        exibirResultados(filtradas);
    }

    function exibirResultados(lista) {
        const listDiv = document.getElementById('resultsList');
        
        if (lista.length === 0) {
            listDiv.innerHTML = "<p style='margin-left:10px; color:#70757a;'>Nenhuma loja encontrada com esse termo em Orleans.</p>";
            return;
        }

        listDiv.innerHTML = lista.map(e => `
            <div class="result-item" onclick="mostrarNoMapa('${e.nome}', '${e.endereco}')">
                <span style="font-size:12px; color:#202124">https://orlecompras.com.br › ${e.bairro.toLowerCase()}</span>
                <a class="result-title">${e.nome}</a>
                <div class="result-snippet"><strong>${e.bairro}</strong>: ${e.desc}</div>
            </div>
        `).join('');
    }

    function mostrarNoMapa(nome, endereco) {
        const iframe = document.getElementById('googleMap');
        const placeholder = document.getElementById('mapPlaceholder');
        const enderecoURL = encodeURIComponent(endereco);
        
        placeholder.style.display = "none";
        iframe.style.display = "block";
        // Integração com Google Maps Embed
        iframe.src = `https://www.google.com/maps/embed/v1/place?key=SUA_CHAVE_API_AQUI&q=${enderecoURL}`;
        
        /* Nota: Para o mapa funcionar perfeitamente sem erros de 'recusou conexão', 
           o ideal é usar a URL de busca padrão se não tiver uma API Key:
        */
        iframe.src = `https://maps.google.com/maps?q=${enderecoURL}&t=&z=15&ie=UTF8&iwloc=&output=embed`;
    }
</script>

</body>
</html>
