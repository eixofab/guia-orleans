<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - Orleans/SC</title>
    <style>
        :root {
            --google-blue: #4285f4;
            --google-gray: #70757a;
            --border-color: #dfe1e5;
        }

        body {
            font-family: 'arial', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: white;
        }

        /* Topo / Menu */
        nav {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 15px;
            box-sizing: border-box;
        }
        nav a {
            text-decoration: none;
            color: black;
            font-size: 13px;
            margin-left: 15px;
            padding: 5px;
        }
        .btn-cadastro {
            background: var(--google-blue);
            color: white !important;
            padding: 8px 15px !important;
            border-radius: 4px;
            font-weight: bold;
        }

        /* Centro - Logo e Busca */
        .search-section {
            margin-top: 100px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            transition: margin-top 0.4s ease;
        }

        .logo {
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }
        .logo span:nth-child(1) { color: #4285F4; } /* G */
        .logo span:nth-child(2) { color: #EA4335; } /* o */
        .logo span:nth-child(3) { color: #FBBC05; } /* o */
        .logo span:nth-child(4) { color: #4285F4; } /* g */
        .logo span:nth-child(5) { color: #34A853; } /* l */
        .logo span:nth-child(6) { color: #EA4335; } /* e */

        .search-wrapper {
            position: relative;
            margin: 0 10px;
        }

        .search-bar {
            width: 100%;
            padding: 14px 20px 14px 45px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            outline: none;
            transition: box-shadow 0.2s;
        }
        .search-bar:hover, .search-bar:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 15px;
            color: #9aa0a6;
        }

        /* Resultados */
        .results-container {
            width: 100%;
            max-width: 700px;
            margin-top: 30px;
            display: none; /* Escondido inicialmente */
            padding: 20px;
        }

        .res-item {
            margin-bottom: 30px;
            animation: fadeIn 0.5s;
        }
        .res-link { color: #202124; font-size: 14px; margin-bottom: 4px; display: block; }
        .res-title { color: #1a0dab; font-size: 20px; text-decoration: none; cursor: pointer; }
        .res-title:hover { text-decoration: underline; }
        .res-desc { color: #4d5156; font-size: 14px; line-height: 1.5; margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estado "Pesquisado" */
        body.searched .search-section { margin-top: 20px; }
        body.searched .logo { font-size: 30px; margin-bottom: 15px; text-align: left; margin-left: 20px; }
        body.searched .results-container { display: block; }
    </style>
</head>
<body id="body">

<nav>
    <a href="#">Imagens</a>
    <a href="cadastro.html" class="btn-cadastro">Anuncie sua Empresa</a>
</nav>

<div class="search-section" id="searchSection">
    <div class="logo">
        <span>O</span><span>r</span><span>l</span><span>e</span><span>a</span><span>n</span><span>s</span>
    </div>
    
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="mainSearch" class="search-bar" placeholder="Pesquisar em Orleans..." onkeyup="handleSearch(event)">
    </div>
</div>

<div class="results-container" id="results">
    <p style="color: #70757a; font-size: 14px;" id="stats"></p>
    <div id="itemsList"></div>
</div>

<script>
    let empresas = [];

    // Carregando do seu JSON
    async function carregarDados() {
        try {
            const res = await fetch('empresas.json');
            empresas = await res.json();
        } catch(e) { 
            // Mock para teste se o JSON não carregar localmente
            empresas = [
                { nome: "Paredão do Zé", desc: "Melhor gastronomia típica de Orleans.", bairro: "Centro", cat: "Restaurante" },
                { nome: "Museu ao Ar Livre", desc: "Patrimônio histórico e cultural único na América Latina.", bairro: "Conde D'Eu", cat: "Turismo" }
            ];
        }
    }

    function handleSearch(e) {
        const termo = e.target.value.toLowerCase();
        
        if (e.key === 'Enter' && termo !== "") {
            document.getElementById('body').classList.add('searched');
            executarBusca(termo);
        }
    }

    function executarBusca(termo) {
        const filtradas = empresas.filter(emp => 
            emp.nome.toLowerCase().includes(termo) || 
            emp.bairro.toLowerCase().includes(termo) ||
            emp.categoria?.toLowerCase().includes(termo)
        );

        const listDiv = document.getElementById('itemsList');
        document.getElementById('stats').innerText = `Aproximadamente ${filtradas.length} resultados encontrados.`;

        listDiv.innerHTML = filtradas.map(emp => `
            <div class="res-item">
                <span class="res-link">www.orleans.sc.gov.br › ${emp.bairro.toLowerCase()}</span>
                <a class="res-title" onclick="alert('Abrindo mapa para: ${emp.nome}')">${emp.nome} - ${emp.bairro}</a>
                <div class="res-desc">
                    <strong>${emp.categoria || 'Empresa'}</strong> · Localizada em Orleans, Santa Catarina. 
                    Confira horários e telefone para contato direto com este estabelecimento.
                </div>
            </div>
        `).join('');
    }

    carregarDados();
</script>

</body>
</html>
