<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Orleans - Busca Local</title>
    <style>
        :root {
            --gray-text: #70757a;
            --blue-link: #1a0dab;
            --google-blue: #4285f4;
            --border-hover: #dfe1e5;
        }

        body {
            font-family: 'arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Topo */
        header {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 15px 20px;
            box-sizing: border-box;
            gap: 15px;
        }
        header a { text-decoration: none; color: rgba(0,0,0,0.87); font-size: 13px; padding-top: 5px; }
        .avatar { width: 32px; height: 32px; background: #7b1fa2; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        /* Container Principal */
        .search-wrapper {
            margin-top: 150px;
            width: 100%;
            max-width: 584px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-size: 90px;
            font-family: 'Product Sans', Arial, sans-serif;
            font-weight: 500;
            margin-bottom: 30px;
            letter-spacing: -2.5px;
            cursor: default;
        }
        .logo span:nth-child(1) { color: #4285F4; } /* O */
        .logo span:nth-child(2) { color: #EA4335; } /* r */
        .logo span:nth-child(3) { color: #FBBC05; } /* l */
        .logo span:nth-child(4) { color: #4285F4; } /* e */
        .logo span:nth-child(5) { color: #34A853; } /* a */
        .logo span:nth-child(6) { color: #EA4335; } /* n */
        .logo span:nth-child(7) { color: #FBBC05; } /* s */

        /* Barra de Pesquisa */

            width: 100%;
            display: flex;
            align-items: center;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 2px 8px 2px 14px;
            transition: box-shadow 0.1s;
        }
        .input-box:hover, .input-box:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }
