<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - Orleans SC</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', arial, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; background: #fff; }
        
        /* Cabeçalho */
        header { display: flex; justify-content: flex-end; padding: 15px 25px; gap: 20px; align-items: center; }
        header a { text-decoration: none; color: #000; font-size: 13px; opacity: 0.85; }
        header a:hover { text-decoration: underline; }
        .btn-blue { background: #1a73e8; color: white !important; padding: 9px 23px; border-radius: 4px; font-weight: 500; }

        /* Centro (Modo Home) */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 15vh; transition: all 0.3s ease; }
        
        .logo { font-size: 90px; font-weight: 500; margin-bottom: 25px; letter-spacing: -2px; }
        .logo span:nth-child(1) { color: #4285F4; } /* O */
        .logo span:nth-child(2) { color: #EA4335; } /* r */
        .logo span:nth-child(3) { color: #FBBC05; } /* l */
        .logo span:nth-child(4) { color: #4285F4; } /* e */
        .logo span:nth-child(5) { color: #34A853; } /* a */
        .logo span:nth-child(6) { color: #EA4335; } /* n */
        .logo span:nth-child(7) { color: #FBBC05; } /* s */

        .search-area { width: 100%; max-width: 584px; padding: 0 20px; text-align: center
