<style>
    /* Ajuste na Wrapper para alinhar o botão */
    .search-wrapper {
        position: relative;
        margin: 0 10px;
        display: flex;
        align-items: center;
        max-width: 600px;
        width: 100%;
    }

    .search-bar {
        flex: 1;
        padding: 14px 100px 14px 45px; /* Espaço para o ícone e o botão */
        font-size: 16px;
        border: 1px solid var(--border-color);
        border-radius: 24px;
        outline: none;
        transition: box-shadow 0.2s;
    }

    .btn-search-inline {
        position: absolute;
        right: 8px;
        background: #f8f9fa;
        border: 1px solid #f8f9fa;
        color: #3c4043;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 14px;
        cursor: pointer;
        transition: border 0.2s, box-shadow 0.2s;
    }

    .btn-search-inline:hover {
        box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        background-image: -webkit-linear-gradient(top,#f8f8f8,#f1f1f1);
        background-color: #f8f8f8;
        border: 1px solid #dadce0;
        color: #202124;
    }

    /* Ajuste para mobile */
    @media (max-width: 480px) {
        .search-bar { padding-right: 80px; }
        .btn-search-inline { padding: 8px 10px; font-size: 12px; }
    }
</style>

<div class="search-section" id="searchSection">
    <div class="logo">
        <span>O</span><span>r</span><span>l</span><span>e</span><span>a</span><span>n</span><span>s</span>
    </div>
    
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="mainSearch" class="search-bar" placeholder="Pesquisar em Orleans..." onkeyup="handleKey(event)">
        <button class="btn-search-inline" onclick="dispararBusca()">Pesquisa</button>
    </div>
</div>

<script>
    // Função unificada para disparar a lógica
    function dispararBusca() {
        const campo = document.getElementById('mainSearch');
        const termo = campo.value.toLowerCase().trim();
        
        if (termo !== "") {
            document.getElementById('body').classList.add('searched');
            executarBusca(termo);
        }
    }

    // Captura o Enter
    function handleKey(e) {
        if (e.key === 'Enter') {
            dispararBusca();
        }
    }

    // A função executarBusca(termo) permanece a mesma da resposta anterior
    function executarBusca(termo) {
        const filtradas = empresas.filter(emp => 
            emp.nome.toLowerCase().includes(termo) || 
            emp.bairro.toLowerCase().includes(termo) ||
            (emp.categoria && emp.categoria.toLowerCase().includes(termo))
        );

        const listDiv = document.getElementById('itemsList');
        document.getElementById('results').style.display = "block"; // Garante que apareça
        document.getElementById('stats').innerText = `Aproximadamente ${filtradas.length} resultados encontrados.`;

        listDiv.innerHTML = filtradas.map(emp => `
            <div class="res-item">
                <span class="res-link">https://guiadeorleans.com.br › ${emp.bairro.toLowerCase()}</span>
                <a class="res-title" href="#" onclick="alert('Local: ${emp.endereco || emp.nome}')">${emp.nome}</a>
                <div class="res-desc">
                    <strong>${emp.categoria || 'Comércio'}</strong> · Localizado em Orleans, SC. 
                    Bairro: ${emp.bairro}. Clique para ver detalhes e localização.
                </div>
            </div>
        `).join('');
    }
</script>
